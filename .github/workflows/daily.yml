name: Daily Task Scrape

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00 = 北京时间 8:00
  workflow_dispatch:       # 也可手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install crawl4ai
      - name: Scrape tasks
        run: python task_scraper_v2.py
      - name: Generate content
        run: python content_marketing.py
      - name: Commit results
        run: |
          git config user.name "Task Bot"
          git config user.email "bot@zero-costearn.local"
          git add data/ content/
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
